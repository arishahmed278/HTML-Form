<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Bio data</legend>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Enter name">
        <br>
        <label for="password">password</label>
        <input type="password" id="password" placeholder="Enter password" name="password" required minlength="5" maxlength="10">
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>
        <br>
        <label for="pic">Profile Picture:</label>
        <input type="file" id="pic" name="profile_pic">
        <br>
        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <label for="nationality">Select Nationality:</label>
        <select id="nationality" name="nationality">
        <option selected disabled>Select Nationality</option>
        <option value="pakistani">Pakistani</option>
        <option value="indian">Indian</option>
        <option value="american">American</option>
        <option value="british">British</option>
        <option value="canadian">Canadian</option>
        </select>
        <br>
        <label for="city">Select City:</label>
        <select id="city" name="city">
        <option selected disabled>Select City</option>    
        <option value="karachi">Karachi</option>
        <option value="multan">multan</option>
        <option value="lahore">Lahore</option>
        <option value="islamabad">Islamabad</option>
        <option value="quetta">Quetta</option>
        </select>
    </fieldset>
     <fieldset>
     <legend>Professional Experience</legend>

     <label for="experience">Total Professional Experience:</label>
     <input type="number" id="experience" name="experience" min="5"><br><br>

     <label for="qualification">Qualification:</label>
     <select id="qualification" name="qualification">
     <option value="">Select Qualification</option>
     <option value="matric">Matric</option>
     <option value="intermediate">Intermediate</option>
     <option value="bachelor">Bachelor</option>
     <option value="master">Master</option>
     </select>
     </fieldset>
     <fieldset>
     <legend>Other Details</legend>

     <label for="subjects">Favourite Subjects:</label>
     <select id="subjects" name="subjects" multiple>
     <option value="math">Math</option>
     <option value="physics">Physics</option>
     <option value="chemistry">Chemistry</option>
     <option value="computer">Computer</option>
     <option value="english">English</option>
     </select>
     </fieldset>
</body>
</html>
